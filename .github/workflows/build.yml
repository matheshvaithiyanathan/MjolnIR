name: Build MjölnIR Installer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual triggering

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: |
        pyinstaller mjolnir.spec --noconfirm

    - name: Compile Installer (Inno Setup)
      uses: GabrielBB/xvfb-action@v1 # Helper to run GUI-based tools if needed, but ISCC usually works fine
      with:
        run: iscc mjolnir_installer.iss
      
    - name: Upload Installer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Mjolnir-Installer
        path: Output/*.exe
